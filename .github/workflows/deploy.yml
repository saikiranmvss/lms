name: Deploy

on:
  push:
    branches: [main, production]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

env:
  APP_NAME: lms
  APP_PORT: "3101"
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        env:
          BASE_PATH: ${{ secrets.APP_BASE_PATH || '/lms/' }}
        run: |
          npm ci
          npm run build
      - name: Prepare backend
        working-directory: backend
        run: npm ci
      - name: Create artifact
        run: |
          TS=$(date -u +%Y%m%d_%H%M%S)
          ARTIFACT="lms-${GITHUB_SHA::7}-${TS}.tar.gz"
          tar -czf "${ARTIFACT}" --exclude=node_modules backend frontend/dist
          echo "ARTIFACT=${ARTIFACT}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact
          path: lms-*.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: deploy-artifact
      - run: echo "ARTIFACT=$(ls lms-*.tar.gz | head -1)" >> "$GITHUB_ENV"
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Trust server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SERVER_PORT || 22 }}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
      - name: Test SSH connection
        run: |
          ssh -p "${{ secrets.SERVER_PORT || 22 }}" -o BatchMode=yes -o ConnectTimeout=15 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "whoami && echo ssh_ok"
      - name: Upload files
        run: |
          scp -P "${{ secrets.SERVER_PORT || 22 }}" "${ARTIFACT}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/${ARTIFACT}"
          tar -czf /tmp/deploy-scripts.tar.gz -C scripts .
          scp -P "${{ secrets.SERVER_PORT || 22 }}" /tmp/deploy-scripts.tar.gz \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/deploy-scripts-${{ env.APP_NAME }}.tar.gz"
      - name: Write .env
        run: |
          ssh -p "${{ secrets.SERVER_PORT || 22 }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "sudo mkdir -p /var/www/${{ env.APP_NAME }}/shared"
          printf '%s' "${{ secrets.ENV_FILE }}" | ssh -p "${{ secrets.SERVER_PORT || 22 }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "sudo tee /var/www/${{ env.APP_NAME }}/shared/.env > /dev/null && sudo chmod 600 /var/www/${{ env.APP_NAME }}/shared/.env && sudo chown deploy:deploy /var/www/${{ env.APP_NAME }}/shared/.env"
      - name: Provision and deploy
        env:
          APP_BASE_PATH: ${{ secrets.APP_BASE_PATH }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          APP_SUBDOMAIN: ${{ secrets.APP_SUBDOMAIN }}
          SERVER_BASE_DOMAIN: ${{ secrets.SERVER_BASE_DOMAIN }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          MIGRATE_ON_DEPLOY: ${{ secrets.MIGRATE_ON_DEPLOY || 'false' }}
          MIGRATE_FORCE: ${{ secrets.MIGRATE_FORCE || 'false' }}
          RELEASES_TO_KEEP: ${{ secrets.RELEASES_TO_KEEP || '5' }}
          SSL_EMAIL: ${{ secrets.SSL_EMAIL }}
        run: |
          ssh -p "${{ secrets.SERVER_PORT || 22 }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "set -euo pipefail
             sudo mkdir -p /var/www/${{ env.APP_NAME }}/scripts
             sudo tar -xzf /tmp/deploy-scripts-${{ env.APP_NAME }}.tar.gz -C /var/www/${{ env.APP_NAME }}/scripts
             sudo chmod +x /var/www/${{ env.APP_NAME }}/scripts/*.sh /var/www/${{ env.APP_NAME }}/scripts/lib/*.sh 2>/dev/null || true
             sudo APP_NAME='${{ env.APP_NAME }}' APP_PORT='${{ env.APP_PORT }}' NODE_VERSION='${{ env.NODE_VERSION }}' \
               APP_BASE_PATH='${APP_BASE_PATH}' APP_DOMAIN='${APP_DOMAIN}' \
               APP_SUBDOMAIN='${APP_SUBDOMAIN}' SERVER_BASE_DOMAIN='${SERVER_BASE_DOMAIN}' \
               DB_PASSWORD='${DB_PASSWORD}' DB_NAME='${DB_NAME:-lms}' DB_USER='${DB_USER:-lms}' \
               MIGRATE_ON_DEPLOY='${MIGRATE_ON_DEPLOY}' MIGRATE_FORCE='${MIGRATE_FORCE}' \
               RELEASES_TO_KEEP='${RELEASES_TO_KEEP}' SSL_EMAIL='${SSL_EMAIL}' DEPLOY_USER='deploy' \
               DEPLOY_LOG_TO_STDOUT='true' \
               bash /var/www/${{ env.APP_NAME }}/scripts/ci-provision-and-deploy.sh /tmp/${ARTIFACT}"

      - name: Deployment summary
        run: |
          {
            echo "### Deployment complete (provision + deploy)"
            echo "- App: ${{ env.APP_NAME }}"
            echo "- URL: http://${{ secrets.SERVER_HOST }}/lms/"
            echo "- Health: http://${{ secrets.SERVER_HOST }}/lms/api/health"
            echo "- Artifact: ${ARTIFACT}"
          } >> "$GITHUB_STEP_SUMMARY"
