# App-specific deployment configuration — LMS
APP_SLUG="${APP_SLUG:-lms}"
APP_PORT="${APP_PORT:-3101}"
NODE_VERSION="${NODE_VERSION:-20}"
PACKAGE_MANAGER="${PACKAGE_MANAGER:-npm}"
SYSTEMD_UNIT="${SYSTEMD_UNIT:-lms-api}"
HEALTH_PATH="${HEALTH_PATH:-/api/health}"
DB_ENGINE="${DB_ENGINE:-mysql}"
DB_NAME_DEFAULT="${DB_NAME_DEFAULT:-lms}"

API_CWD_REL="backend"
API_START_CMD="node src/server.js"
WEB_ROOT_REL="frontend/dist"
UPLOAD_SYMLINK_REL="backend/public"
# Safe on every deploy: creates tables only when missing; seeds if no users.
MIGRATION_CMD="node src/db/ensure-schema.js"
MIGRATION_REQUIRES_FORCE="${MIGRATION_REQUIRES_FORCE:-false}"
MIGRATION_FORCE_CMD="node src/db/migrate.js"
ENV_SYMLINK_REL="backend/.env"
CLIENT_MAX_BODY_SIZE="${CLIENT_MAX_BODY_SIZE:-2g}"
ENABLE_WEBSOCKET="${ENABLE_WEBSOCKET:-false}"
